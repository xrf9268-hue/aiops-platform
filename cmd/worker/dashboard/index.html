<!doctype html>
<html lang="en" data-brand="linen" data-theme="light" data-density="compact">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="aiops-platform worker status — read-only view of /api/v1/state" />
    <title>aiops · Worker status</title>
    <script>
      // Apply the saved brand/theme/density before first paint to avoid a flash.
      // Mirrors the keys + defaults used by useSettings() in App.jsx.
      (function () {
        var r = document.documentElement;
        function pick(key, allowed, fallback) {
          try {
            var v = localStorage.getItem('dashboard.' + key);
            if (allowed.indexOf(v) !== -1) return v;
          } catch (e) {}
          return fallback;
        }
        var sys = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        r.dataset.brand = pick('brand', ['linen', 'anthropic'], 'linen');
        r.dataset.theme = pick('theme', ['light', 'dark'], sys);
        r.dataset.density = pick('density', ['compact', 'comfy'], 'compact');
      })();
    </script>
  </head>
  <body>
    <!-- Pre-mount shell: matches the React loading state so first paint is on-brand. -->
    <div id="root">
      <div class="app">
        <div class="topbar">
          <div class="brand">
            <div class="brand-mark"><span>a</span></div>
            <div class="brand-name">aiops</div>
          </div>
          <div class="spacer"></div>
          <span class="live-pill conn"><span class="dot"></span>Connecting…</span>
        </div>
        <div class="title-row">
          <div>
            <h1 class="page-title">Worker <em>status</em></h1>
            <p class="page-sub">Connecting to the worker state API…</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
