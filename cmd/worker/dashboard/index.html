<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="aiops-platform runtime state dashboard backed by /api/v1/state" />
    <title>aiops-platform dashboard</title>
    <script>
      // Apply the saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main class="w-full max-w-[1280px] mx-auto px-4 py-8">
        <header class="p-6 sm:p-7 border border-line-strong rounded-3xl bg-surface">
          <div class="flex items-center gap-2.5 mb-3">
            <span class="inline-flex items-center justify-center w-7 h-7 rounded-lg bg-accent text-white shrink-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 12 5 6M12 12l7-6M12 12v7" />
                <circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none" />
                <circle cx="5" cy="6" r="2" />
                <circle cx="19" cy="6" r="2" />
                <circle cx="12" cy="20" r="2" />
              </svg>
            </span>
            <span class="text-accent-ink uppercase text-label tracking-widest font-bold font-display">aiops-platform</span>
          </div>
          <h1 class="text-h1 sm:text-display font-bold tracking-tight mb-3">Operations Dashboard</h1>
          <p class="text-muted font-serif">Loading runtime state from <code>/api/v1/state</code>…</p>
        </header>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
