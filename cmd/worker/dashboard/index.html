<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="aiops-platform runtime state dashboard backed by /api/v1/state" />
    <title>aiops-platform dashboard</title>
    <script>
      // Apply the saved/system theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <main class="w-full max-w-[1280px] mx-auto px-4 py-8">
        <header class="p-7 border border-line-strong rounded-3xl bg-surface">
          <p class="text-accent uppercase text-xs tracking-widest font-bold mb-2">aiops-platform</p>
          <h1 class="text-4xl sm:text-5xl font-bold tracking-tight leading-none mb-3">Operations Dashboard</h1>
          <p class="text-muted">Loading runtime state from <code>/api/v1/state</code>…</p>
        </header>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
