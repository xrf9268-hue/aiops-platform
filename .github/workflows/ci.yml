name: CI

run-name: CI / ${{ github.ref_name }} / ${{ github.event_name }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run GitHub script tests
        run: node --test .github/scripts/capture-unresolved-reviews.test.mjs

      - name: Download dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          files="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Verify Dockerfile Go version matches go.mod
        shell: bash
        run: |
          set -euo pipefail
          go_mod_version=$(awk '/^go [0-9]/ {split($2, p, "."); print p[1]"."p[2]; exit}' go.mod)
          docker_version=$(awk -F= '/^ARG GO_VERSION=/ {print $2; exit}' Dockerfile)
          if [ -z "$go_mod_version" ] || [ -z "$docker_version" ]; then
            echo "could not extract version: go.mod=$go_mod_version Dockerfile=$docker_version"
            exit 1
          fi
          if [ "$go_mod_version" != "$docker_version" ]; then
            echo "Drift detected: go.mod Go major.minor = '$go_mod_version', Dockerfile GO_VERSION = '$docker_version'"
            echo "Bump them together."
            exit 1
          fi
          echo "Go version aligned: $go_mod_version"

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test -race -covermode=atomic ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/worker ./cmd/worker
          go build -trimpath -ldflags="-s -w" -o dist/linear-poller ./cmd/linear-poller
          go build -trimpath -ldflags="-s -w" -o dist/gitea-poller ./cmd/gitea-poller

      - name: Upload CI binaries
        uses: actions/upload-artifact@v7
        with:
          name: aiops-platform-linux-amd64
          path: dist/
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: E2E Gitea mock loop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum
      - name: Download dependencies
        run: go mod download
      - name: Pre-pull container images
        run: |
          docker pull postgres:16
          docker pull gitea/gitea:1.26.1-rootless
      - name: Run e2e tests
        run: go test -tags e2e -race -timeout 15m ./test/e2e/...

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - go

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build --pull --tag aiops-platform:ci .
