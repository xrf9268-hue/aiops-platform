name: CI

run-name: CI / ${{ github.ref_name }} / ${{ github.event_name }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out for reusable CI callers"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cmd/worker/dashboard/package-lock.json

      - name: Run GitHub script tests
        run: node --test .github/scripts/capture-unresolved-reviews.test.mjs

      - name: Install dashboard dependencies
        working-directory: cmd/worker/dashboard
        run: npm ci

      - name: Test dashboard
        working-directory: cmd/worker/dashboard
        run: npm test

      - name: Build dashboard
        working-directory: cmd/worker/dashboard
        run: npm run build

      - name: Verify dashboard dist is committed
        run: |
          if ! git diff --exit-code -- cmd/worker/dashboard/dist; then
            echo "dashboard dist/ is out of sync with src/. Run 'npm run build' and commit dist."
            exit 1
          fi
          visible_untracked="$(git ls-files --others --exclude-standard -- cmd/worker/dashboard/dist)"
          ignored_untracked="$(git ls-files --others --ignored --exclude-standard -- cmd/worker/dashboard/dist)"
          untracked="$(printf "%s\n%s\n" "$visible_untracked" "$ignored_untracked" | sed '/^$/d')"
          if [ -n "$untracked" ]; then
            echo "dashboard dist/ contains untracked generated files:"
            echo "$untracked"
            echo "Run 'npm run build' and commit the generated dist files."
            exit 1
          fi

      - name: Download dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          files="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Run golangci-lint blocking correctness gate
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          args: --config=.golangci.yml --enable-only=contextcheck,errcheck,errorlint,gocritic,govet,ineffassign,revive,staticcheck,unparam,unused

      - name: Run golangci-lint report-only baseline
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          args: --config=.golangci.yml --enable-only=funlen,gocognit --issues-exit-code=0

      - name: Verify Dockerfile Go version matches go.mod
        shell: bash
        run: |
          set -euo pipefail
          go_mod_version=$(awk '/^go [0-9]/ {split($2, p, "."); print p[1]"."p[2]; exit}' go.mod)
          docker_version=$(awk -F= '/^ARG GO_VERSION=/ {print $2; exit}' Dockerfile)
          if [ -z "$go_mod_version" ] || [ -z "$docker_version" ]; then
            echo "could not extract version: go.mod=$go_mod_version Dockerfile=$docker_version"
            exit 1
          fi
          if [ "$go_mod_version" != "$docker_version" ]; then
            echo "Drift detected: go.mod Go major.minor = '$go_mod_version', Dockerfile GO_VERSION = '$docker_version'"
            echo "Bump them together."
            exit 1
          fi
          echo "Go version aligned: $go_mod_version"

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test -race -covermode=atomic ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/worker ./cmd/worker
          go build -trimpath -ldflags="-s -w" -o dist/tui ./cmd/tui

      - name: Upload CI binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aiops-platform-linux-amd64
          path: dist/
          if-no-files-found: error
          retention-days: 7

  security:
    name: Security and supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      # Use the latest 1.25.x patch toolchain (not the pinned go.mod floor) so
      # govulncheck evaluates the code against an up-to-date standard library.
      # go.mod's `go` directive is intentionally left untouched.
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          # Always resolve the newest 1.25.x rather than a stale cached patch,
          # so govulncheck evaluates against an up-to-date standard library.
          check-latest: true
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  e2e:
    name: E2E Gitea mock loop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum
      - name: Download dependencies
        run: go mod download
      - name: Pre-pull container images
        run: |
          docker pull gitea/gitea:1.26.1-rootless
      - name: Run e2e tests
        run: go test -tags e2e -race -timeout 15m ./test/e2e/...

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - go

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Build Docker image
        run: docker build --pull --tag aiops-platform:ci .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aiops-platform:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"

      - name: Generate SBOM (Trivy, CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: aiops-platform:ci
          format: cyclonedx
          output: aiops-platform-sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aiops-platform-sbom
          path: aiops-platform-sbom.cdx.json
          if-no-files-found: error
          retention-days: 7
