name: CI

run-name: CI / ${{ github.ref_name }} / ${{ github.event_name }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out for reusable CI callers"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cmd/worker/dashboard/package-lock.json

      - name: Run GitHub script tests
        run: node --test .github/scripts/*.test.mjs

      - name: Run Trellis script tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=.trellis/scripts python3 -m unittest discover -s .trellis/scripts/tests -p 'test_*.py'

      - name: Install dashboard dependencies
        working-directory: cmd/worker/dashboard
        run: npm ci

      - name: Test dashboard
        working-directory: cmd/worker/dashboard
        run: npm test

      - name: Build dashboard
        working-directory: cmd/worker/dashboard
        run: npm run build

      - name: Verify dashboard dist is generated for embed
        run: |
          test -f cmd/worker/dashboard/dist/index.html
          test -n "$(find cmd/worker/dashboard/dist/assets -name '*.js' -print -quit)"

      - name: Download dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          files="$(git ls-files '*.go' | xargs -r gofmt -l)"
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      # Single blocking gate for all enabled linters, including AGENTS.md rule 7's
      # funlen/gocognit budgets. The existing complexity baseline is grandfathered
      # in-line with per-function `//nolint:gocognit[,funlen] // baseline (#521)`
      # directives (removed as #521 decomposes each), so a new oversized /
      # over-complex non-test function — or in-place growth of an un-annotated one
      # — fails. _test.go is excluded in .golangci.yml.
      - name: Run golangci-lint blocking gate
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --config=.golangci.yml --enable-only=contextcheck,errcheck,errorlint,funlen,gocognit,gocritic,govet,ineffassign,revive,staticcheck,unparam,unused

      - name: Verify Dockerfile Go version matches go.mod
        shell: bash
        run: |
          set -euo pipefail
          # Compare the FULL patch version (not just major.minor): the
          # codex-worker image copies /usr/local/go from golang:${GO_VERSION}
          # into the agent runtime, so the shipped toolchain patch must equal the
          # go.mod security floor (scan == ship). A floating golang:1.25 base
          # could ship a pre-floor patch even with the gate green (GO-2026-5037/
          # 5039); pinning both to the same exact patch closes that gap.
          go_mod_version=$(awk '/^go [0-9]/ {print $2; exit}' go.mod)
          docker_version=$(awk -F= '/^ARG GO_VERSION=/ {print $2; exit}' Dockerfile)
          if [ -z "$go_mod_version" ] || [ -z "$docker_version" ]; then
            echo "could not extract version: go.mod=$go_mod_version Dockerfile=$docker_version"
            exit 1
          fi
          if [ "$go_mod_version" != "$docker_version" ]; then
            echo "Drift detected: go.mod Go version = '$go_mod_version', Dockerfile GO_VERSION = '$docker_version'"
            echo "Bump them together to the same exact patch."
            exit 1
          fi
          echo "Go version aligned: $go_mod_version"

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check production Go file size budget
        run: go test -run '^TestProductionGoFilesStayWithinSizeBudget$' -count=1 ./scripts

      - name: Run tests
        run: go test -race -covermode=atomic ./...

      - name: Run fuzz smoke (short)
        run: |
          go test -run='^$' -fuzz='^FuzzRender$' -fuzztime=30s ./internal/workflow
          go test -run='^$' -fuzz='^FuzzParseLinearGraphQLOperation$' -fuzztime=30s ./internal/runner

      - name: Build binaries
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/worker ./cmd/worker
          go build -trimpath -ldflags="-s -w" -o dist/tui ./cmd/tui

      - name: Upload CI binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aiops-platform-linux-amd64
          path: dist/
          if-no-files-found: error
          retention-days: 7

  security:
    name: Security and supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      # Build the govulncheck toolchain from the go.mod floor (now 1.25.11, the
      # patched release for GO-2026-5037/5039) so the scan evaluates the same
      # standard library the release/docker builds ship. The previous "latest
      # 1.25.x via check-latest" posture broke when the actions version manifest
      # lagged the 1.25.11 security release: check-latest still resolved a
      # vulnerable 1.25.10, so the gate failed repo-wide while shipped artifacts
      # stayed on the unpatched floor. Pinning scan == ship via go.mod fixes both.
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  e2e:
    name: E2E Gitea mock loop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum
      - name: Download dependencies
        run: go mod download
      - name: Pre-pull container images
        run: |
          docker pull gitea/gitea:1.26.1-rootless
      - name: Run e2e tests
        run: go test -tags e2e -race -timeout 15m ./test/e2e/...

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - go

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Build Docker image
        run: docker build --pull --tag aiops-platform:ci .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aiops-platform:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"

      - name: Generate SBOM (Trivy, CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: aiops-platform:ci
          format: cyclonedx
          output: aiops-platform-sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aiops-platform-sbom
          path: aiops-platform-sbom.cdx.json
          if-no-files-found: error
          retention-days: 7
