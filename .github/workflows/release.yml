name: Release

run-name: Release / ${{ github.ref_name || inputs.tag }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      ref: ${{ steps.release.outputs.ref }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
    steps:
      - name: Validate release tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag"
            exit 1
          fi
          git check-ref-format "refs/tags/$tag"

      - name: Checkout release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
            ref="refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            ref="${GITHUB_REF}"
          fi
          commit_sha="$(git rev-parse --verify "${ref}^{commit}")"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  ci:
    name: Reuse CI quality gates
    needs:
      - resolve
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}

  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve
      - ci
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cmd/worker/dashboard/package-lock.json

      - name: Verify tag exists
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          resolved_sha="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$resolved_sha" != "$RELEASE_COMMIT_SHA" ]; then
            echo "Release tag $RELEASE_TAG moved from $RELEASE_COMMIT_SHA to $resolved_sha"
            exit 1
          fi

      - name: Build dashboard
        working-directory: cmd/worker/dashboard
        run: |
          npm ci
          npm run build

      - name: Build release binaries
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          binaries=(worker tui)
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            out="dist/aiops-platform_${RELEASE_TAG}_${goos}_${goarch}"
            for binary in "${binaries[@]}"; do
              # Stamp the release tag into each binary's main.version (#796);
              # both cmd/worker and cmd/tui are package main with their own var.
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_TAG}" -o "${out}/${binary}" "./cmd/${binary}"
            done
          done

      - name: Generate release SBOM (Trivy, CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist
          format: cyclonedx
          output: dist/aiops-platform_${{ needs.resolve.outputs.tag }}_sbom.cdx.json

      - name: Package release archives
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          for out in dist/aiops-platform_${RELEASE_TAG}_*; do
            [ -d "$out" ] || continue
            # Ship a runnable starting point alongside the binaries so a
            # binary-download user has a config template without cloning (#797).
            # Keep WORKFLOW.md under examples/ so the bundled .env.example's
            # AIOPS_WORKFLOW_PATH=examples/WORKFLOW.md resolves from the
            # extracted directory.
            mkdir -p "$out/examples"
            cp examples/WORKFLOW.md "$out/examples/"
            cp .env.example "$out/"
            tar -C dist -czf "${out}.tar.gz" "$(basename "$out")"
            rm -rf "$out"
          done

      - name: Generate SHA256SUMS
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          # Plain checksums file so operators without the gh CLI / attestation
          # flow can still verify archive integrity (#797). Computed over the
          # archives + SBOM (basenames only, so `sha256sum -c` works from the
          # download dir); emitted before attestation so the existing
          # subject-path: dist/* step signs it too.
          ( cd dist && sha256sum \
              "aiops-platform_${RELEASE_TAG}"_*.tar.gz \
              "aiops-platform_${RELEASE_TAG}_sbom.cdx.json" \
              > "aiops-platform_${RELEASE_TAG}_SHA256SUMS" )

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/*

      - name: Publish release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          resolved_sha="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$resolved_sha" != "$RELEASE_COMMIT_SHA" ]; then
            echo "Release tag $RELEASE_TAG moved from $RELEASE_COMMIT_SHA to $resolved_sha"
            exit 1
          fi
          # release-please owns the GitHub Release (it creates the tag and the
          # Release with changelog notes); this job only attaches artifacts.
          # The create fallback keeps the manual workflow_dispatch path working
          # for a tag that has no Release yet.
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Automated aiops-platform release for $RELEASE_TAG" \
              --verify-tag
          fi
          gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*_sbom.cdx.json dist/*_SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - resolve
      - ci
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.commit_sha }}

      - name: Verify tag matches resolved commit
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          resolved_sha="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$resolved_sha" != "$RELEASE_COMMIT_SHA" ]; then
            echo "Release tag $RELEASE_TAG moved from $RELEASE_COMMIT_SHA to $resolved_sha"
            exit 1
          fi

      - name: Determine if this is the newest release
        id: latest
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin >/dev/null 2>&1 || true
          # Filter to strict vMAJOR.MINOR.PATCH releases (the same shape the
          # resolve job validates) before taking the highest, so a stray or
          # prerelease tag like v2.0.0-rc.1 — which the `v*.*.*` glob also
          # matches — can't outrank a real release and strand `:latest`.
          highest="$(git tag --list 'v*.*.*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          # `:latest` (the Compose default) follows the newest release tag only.
          # A real tag push (the new tag is highest) and a manual re-publish of
          # the current release both qualify; a workflow_dispatch backfill of an
          # OLDER tag does not, so `:latest` never moves backward (#795 review).
          if [ "$RELEASE_TAG" = "$highest" ]; then
            echo "is_newest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_newest=false" >> "$GITHUB_OUTPUT"
          fi
          echo "resolved=$RELEASE_TAG highest=$highest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # Publish the existing worker / codex-worker Dockerfile targets as-is
      # (amd64, matching the CI `docker build`; multi-arch is a deliberate
      # follow-up, not in #795's "publish as-is" scope). VERSION stamps the
      # binary's main.version (#796) since .dockerignore drops .git in-image.
      - name: Build and push worker image
        id: worker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: worker
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.resolve.outputs.tag }}
          # `:latest` only when this resolved tag is the newest release (see the
          # Determine step); a backfill of an older tag emits an empty line,
          # which build-push-action ignores, so the Compose default never moves
          # backward — while manual recovery of the current release still works.
          tags: |
            ghcr.io/${{ github.repository }}-worker:${{ needs.resolve.outputs.tag }}
            ${{ steps.latest.outputs.is_newest == 'true' && format('ghcr.io/{0}-worker:latest', github.repository) || '' }}

      - name: Build and push codex-worker image
        id: codex-worker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          target: codex-worker
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.resolve.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository }}-codex-worker:${{ needs.resolve.outputs.tag }}
            ${{ steps.latest.outputs.is_newest == 'true' && format('ghcr.io/{0}-codex-worker:latest', github.repository) || '' }}

      - name: Attest worker image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}-worker
          subject-digest: ${{ steps.worker.outputs.digest }}
          push-to-registry: true

      - name: Attest codex-worker image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}-codex-worker
          subject-digest: ${{ steps.codex-worker.outputs.digest }}
          push-to-registry: true
