name: Release

run-name: Release / ${{ github.ref_name || inputs.tag }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      ref: ${{ steps.release.outputs.ref }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            ref="refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            ref="${GITHUB_REF}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

  ci:
    name: Reuse CI quality gates
    needs:
      - resolve
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
    with:
      ref: ${{ needs.resolve.outputs.ref }}

  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve
      - ci
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Verify tag exists
        run: git rev-parse --verify "refs/tags/${{ needs.resolve.outputs.tag }}"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          binaries=(worker)
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            out="dist/aiops-platform_${{ needs.resolve.outputs.tag }}_${goos}_${goarch}"
            for binary in "${binaries[@]}"; do
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w" -o "${out}/${binary}" "./cmd/${binary}"
            done
          done

      - name: Generate release SBOM (Trivy, CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist
          format: cyclonedx
          output: dist/aiops-platform_${{ needs.resolve.outputs.tag }}_sbom.cdx.json

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail
          for out in dist/aiops-platform_${{ needs.resolve.outputs.tag }}_*; do
            [ -d "$out" ] || continue
            tar -C dist -czf "${out}.tar.gz" "$(basename "$out")"
            rm -rf "$out"
          done

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: dist/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.resolve.outputs.tag }}" dist/*.tar.gz dist/*_sbom.cdx.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ needs.resolve.outputs.tag }}" \
            --notes "Automated aiops-platform release for ${{ needs.resolve.outputs.tag }}" \
            --verify-tag
