name: Release

run-name: Release / ${{ github.ref_name || inputs.tag }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      ref: ${{ steps.release.outputs.ref }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
    steps:
      - name: Validate release tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag"
            exit 1
          fi
          git check-ref-format "refs/tags/$tag"

      - name: Checkout release ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
            ref="refs/tags/${tag}"
          else
            tag="${GITHUB_REF_NAME}"
            ref="${GITHUB_REF}"
          fi
          commit_sha="$(git rev-parse --verify "${ref}^{commit}")"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  ci:
    name: Reuse CI quality gates
    needs:
      - resolve
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}

  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - resolve
      - ci
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cmd/worker/dashboard/package-lock.json

      - name: Verify tag exists
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          resolved_sha="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$resolved_sha" != "$RELEASE_COMMIT_SHA" ]; then
            echo "Release tag $RELEASE_TAG moved from $RELEASE_COMMIT_SHA to $resolved_sha"
            exit 1
          fi

      - name: Build dashboard
        working-directory: cmd/worker/dashboard
        run: |
          npm ci
          npm run build

      - name: Build release binaries
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          binaries=(worker tui)
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            out="dist/aiops-platform_${RELEASE_TAG}_${goos}_${goarch}"
            for binary in "${binaries[@]}"; do
              GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
                go build -trimpath -ldflags="-s -w" -o "${out}/${binary}" "./cmd/${binary}"
            done
          done

      - name: Generate release SBOM (Trivy, CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: dist
          format: cyclonedx
          output: dist/aiops-platform_${{ needs.resolve.outputs.tag }}_sbom.cdx.json

      - name: Package release archives
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          for out in dist/aiops-platform_${RELEASE_TAG}_*; do
            [ -d "$out" ] || continue
            tar -C dist -czf "${out}.tar.gz" "$(basename "$out")"
            rm -rf "$out"
          done

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          resolved_sha="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$resolved_sha" != "$RELEASE_COMMIT_SHA" ]; then
            echo "Release tag $RELEASE_TAG moved from $RELEASE_COMMIT_SHA to $resolved_sha"
            exit 1
          fi
          gh release create "$RELEASE_TAG" dist/*.tar.gz dist/*_sbom.cdx.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --notes "Automated aiops-platform release for $RELEASE_TAG" \
            --verify-tag
