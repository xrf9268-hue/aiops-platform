name: Ruleset Drift

on:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * *'
  push:
    branches:
      - main
    paths:
      - .github/governance/main-ruleset.json
      - .github/scripts/check-ruleset-drift.sh
      - .github/workflows/ruleset-drift.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Main ruleset drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Compare live ruleset to committed source
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/check-ruleset-drift.sh
