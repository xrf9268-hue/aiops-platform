services:
  worker:
    # Prefer the published image (`docker compose pull` / plain `up`); the
    # build below stays as the `--build` fallback (#795). Override the tag with
    # AIOPS_IMAGE_TAG (e.g. a pinned vX.Y.Z); `latest` tracks the newest release.
    # NOTE: the published image is built as UID 1000. If your host `id -u`
    # differs and you rely on the 0600 SSH-key bind mount below (or the Codex
    # overlay's host-owned CODEX_HOME), run `--build` so the AIOPS_UID/AIOPS_GID
    # args align the container user with the host — the pulled image cannot.
    image: ghcr.io/xrf9268-hue/aiops-platform-worker:${AIOPS_IMAGE_TAG:-latest}
    build:
      context: ..
      # Align the in-container user with the host owner of the deploy key so
      # the read-only 0600 key bind is readable as non-root (#365). Defaults to
      # 1000; set AIOPS_UID/AIOPS_GID in .env to `id -u`/`id -g` if they differ.
      args:
        AIOPS_UID: "${AIOPS_UID:-1000}"
        AIOPS_GID: "${AIOPS_GID:-1000}"
    command: ["worker"]
    # The image runs as the unprivileged aiops user (#365); deny privilege
    # escalation and drop all Linux capabilities the worker never needs.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    environment:
      GITEA_BASE_URL: ${GITEA_BASE_URL}
      GITEA_TOKEN: ${GITEA_TOKEN}
      AIOPS_WORKSPACE_ROOT: /workspaces
      AIOPS_WORKFLOW_PATH: /app/examples/WORKFLOW.md
      AIOPS_HEALTHCHECK_PORT: ${AIOPS_HEALTHCHECK_PORT:-4000}
      LINEAR_API_KEY: ${LINEAR_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${AIOPS_HEALTHCHECK_PORT:-4000}/livez >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - workspaces:/workspaces
      - ../examples:/app/examples:ro
      # Scoped SSH credentials — only the dedicated deploy keypair + its known_hosts
      # are exposed to the agent process, under the aiops user's home. See
      # deploy/ssh/README.md and docs/security-posture.md "Docker Compose SSH key isolation".
      - ${AIOPS_SSH_KEY_PATH:-./ssh/id_ed25519}:/home/aiops/.ssh/id_ed25519:ro
      - ${AIOPS_SSH_KNOWN_HOSTS_PATH:-./ssh/known_hosts}:/home/aiops/.ssh/known_hosts:ro

volumes:
  workspaces:
