services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro

  trigger-api:
    build:
      context: ..
    command: ["trigger-api"]
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://aiops:aiops@postgres:5432/aiops?sslmode=disable
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-dev-secret}
      ADDR: :8080
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
    command: ["worker"]
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://aiops:aiops@postgres:5432/aiops?sslmode=disable
      GITEA_BASE_URL: ${GITEA_BASE_URL}
      GITEA_TOKEN: ${GITEA_TOKEN}
      WORKSPACE_ROOT: /workspaces
    volumes:
      - workspaces:/workspaces
      - ~/.ssh:/root/.ssh:ro

volumes:
  pgdata:
  workspaces:
