services:
  worker:
    build:
      context: ..
      # Align the in-container user with the host owner of the deploy key so
      # the read-only 0600 key bind is readable as non-root (#365). Defaults to
      # 1000; set AIOPS_UID/AIOPS_GID in .env to `id -u`/`id -g` if they differ.
      args:
        AIOPS_UID: "${AIOPS_UID:-1000}"
        AIOPS_GID: "${AIOPS_GID:-1000}"
    command: ["worker"]
    # The image runs as the unprivileged aiops user (#365); deny privilege
    # escalation and drop all Linux capabilities the worker never needs.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    environment:
      GITEA_BASE_URL: ${GITEA_BASE_URL}
      GITEA_TOKEN: ${GITEA_TOKEN}
      AIOPS_WORKSPACE_ROOT: /workspaces
      AIOPS_WORKFLOW_PATH: /app/examples/WORKFLOW.md
      LINEAR_API_KEY: ${LINEAR_API_KEY}
    volumes:
      - workspaces:/workspaces
      - ../examples:/app/examples:ro
      # Scoped SSH credentials — only the dedicated deploy keypair + its known_hosts
      # are exposed to the agent process, under the aiops user's home. See
      # deploy/ssh/README.md and docs/security-posture.md "Docker Compose SSH key isolation".
      - ${AIOPS_SSH_KEY_PATH:-./ssh/id_ed25519}:/home/aiops/.ssh/id_ed25519:ro
      - ${AIOPS_SSH_KNOWN_HOSTS_PATH:-./ssh/known_hosts}:/home/aiops/.ssh/known_hosts:ro

  # Transitional queue services retained only for legacy poller compatibility;
  # cmd/worker no longer depends on Postgres for tracker polling or dispatch.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aiops
      # No hardcoded password (#371). Operators using the legacy-queue profile
      # must set POSTGRES_PASSWORD in .env; left empty the postgres image
      # refuses to initialize, so there is no weak default to leak.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: aiops
    # Bind to host loopback only — never expose Postgres on all interfaces.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    profiles:
      - legacy-queue

  linear-poller:
    build:
      context: ..
    command: ["linear-poller", "/app/examples/WORKFLOW.md"]
    depends_on:
      - postgres
    environment:
      # Password is passed via PGPASSWORD (libpq env), not embedded in the
      # DSN, so a strong password with URL-reserved characters is not mangled.
      DATABASE_URL: postgres://aiops@postgres:5432/aiops?sslmode=disable
      PGPASSWORD: ${POSTGRES_PASSWORD:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY}
    volumes:
      - ../examples:/app/examples:ro
    profiles:
      - legacy-queue

  gitea-poller:
    build:
      context: ..
    command: ["gitea-poller", "/app/examples/gitea-WORKFLOW.md"]
    depends_on:
      - postgres
    environment:
      # Password is passed via PGPASSWORD (libpq env), not embedded in the
      # DSN, so a strong password with URL-reserved characters is not mangled.
      DATABASE_URL: postgres://aiops@postgres:5432/aiops?sslmode=disable
      PGPASSWORD: ${POSTGRES_PASSWORD:-}
      GITEA_BASE_URL: ${GITEA_BASE_URL}
      GITEA_TOKEN: ${GITEA_TOKEN}
    volumes:
      - ../examples:/app/examples:ro
    profiles:
      - legacy-queue

volumes:
  pgdata:
  workspaces:
