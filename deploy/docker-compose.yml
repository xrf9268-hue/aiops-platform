services:
  worker:
    build:
      context: ..
    command: ["worker"]
    environment:
      GITEA_BASE_URL: ${GITEA_BASE_URL}
      GITEA_TOKEN: ${GITEA_TOKEN}
      WORKSPACE_ROOT: /workspaces
      AIOPS_WORKFLOW_PATH: /app/examples/WORKFLOW.md
      LINEAR_API_KEY: ${LINEAR_API_KEY}
    volumes:
      - workspaces:/workspaces
      - ../examples:/app/examples:ro
      - ~/.ssh:/root/.ssh:ro

  # Transitional services retained until D7 retires webhook/manual enqueue
  # ingress. They still use the legacy queue and Postgres; cmd/worker no longer
  # depends on either service for tracker polling or dispatch.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    profiles:
      - legacy-queue

  trigger-api:
    build:
      context: ..
    command: ["trigger-api"]
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://aiops:aiops@postgres:5432/aiops?sslmode=disable
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET:-dev-secret}
      ADDR: :8080
    ports:
      - "8080:8080"
    profiles:
      - legacy-queue

  linear-poller:
    build:
      context: ..
    command: ["linear-poller", "/app/examples/WORKFLOW.md"]
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://aiops:aiops@postgres:5432/aiops?sslmode=disable
      LINEAR_API_KEY: ${LINEAR_API_KEY}
    volumes:
      - ../examples:/app/examples:ro
    profiles:
      - legacy-queue

volumes:
  pgdata:
  workspaces:
