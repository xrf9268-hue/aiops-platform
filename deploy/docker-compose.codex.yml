# Opt-in Codex + secret-backed first-run overlay.
#
# Usage:
#
#   docker compose --env-file .env \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.codex.yml \
#     up --build worker
#
# The overlay builds the `codex-worker` Dockerfile target and feeds sensitive
# values through Docker-supported secret files where possible. Codex auth/config
# live in a CODEX_HOME directory, which Codex CLI 0.133 writes while loading
# configuration and refreshing auth state.
services:
  worker:
    # Override the base image with the published codex-worker image; the
    # build.target below stays as the `--build` fallback (#795).
    image: ghcr.io/xrf9268-hue/aiops-platform-codex-worker:${AIOPS_IMAGE_TAG:-latest}
    build:
      target: codex-worker
    environment:
      AIOPS_WORKFLOW_PATH: /app/WORKFLOW.md
      CODEX_HOME: /home/aiops/.codex
      # Clear plain-env tokens inherited from the base local-dev compose file;
      # this production-style overlay feeds them through service secrets below.
      AIOPS_STATE_API_TOKEN: ""
      GH_TOKEN: ""
      GITEA_TOKEN: ""
      GITHUB_TOKEN: ""
      LINEAR_API_KEY: ""
    entrypoint:
      - /usr/local/bin/aiops-secret-entrypoint
    command:
      - worker
    volumes:
      - ${AIOPS_WORKFLOW_PATH:?set AIOPS_WORKFLOW_PATH to a workflow file}:/app/WORKFLOW.md:ro
      # CODEX_HOME is a restricted writable volume: Codex CLI 0.133 writes while
      # loading config and persists refreshed ChatGPT-login tokens here. Keep it
      # owned by the worker UID/GID and out of git; auth.json is a secret.
      - ${AIOPS_CODEX_HOME_PATH:?set AIOPS_CODEX_HOME_PATH to a Codex home directory}:/home/aiops/.codex
      # Optional, recommended (#465): mount a version-controlled, NON-SECRET
      # config.toml read-only OVER the writable home so model/provider/reasoning
      # selection is declarative and auditable instead of copied from an opaque
      # host config. Uncomment and set AIOPS_CODEX_CONFIG_FILE to an absolute path
      # (e.g. $PWD/deploy/codex/config.toml). Leave auth out of this file.
      # - ${AIOPS_CODEX_CONFIG_FILE:?set AIOPS_CODEX_CONFIG_FILE to a tracked config.toml}:/home/aiops/.codex/config.toml:ro
    secrets:
      - linear_api_key
      - gitea_token
      - github_token
      - aiops_state_api_token

secrets:
  linear_api_key:
    file: ${LINEAR_API_KEY_FILE:?set LINEAR_API_KEY_FILE to a file containing the Linear API key}
  gitea_token:
    file: ${GITEA_TOKEN_FILE:-/dev/null}
  github_token:
    file: ${GITHUB_TOKEN_FILE:-/dev/null}
  aiops_state_api_token:
    file: ${AIOPS_STATE_API_TOKEN_FILE:?set AIOPS_STATE_API_TOKEN_FILE to a file containing the state API token}
