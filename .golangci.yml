version: "2"

# Full lint surface. CI runs the clean low-risk subset as blocking, then runs
# this full set report-only while follow-up cleanup continues.
run:
  timeout: 5m

linters:
  default: none
  enable:
    - contextcheck
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    funlen:
      lines: 80
      statements: 50
      ignore-comments: true
    gocognit:
      min-complexity: 10
    revive:
      rules:
        - name: var-naming
          arguments:
            - ["ID", "API", "HTTP", "HTTPS", "URL", "JSON", "SQL", "UUID"]
            - []

formatters:
  enable:
    - gofmt
