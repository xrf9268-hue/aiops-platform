version: "2"

# Full lint surface. CI runs the clean correctness/mechanical-safety subset as
# blocking, then keeps funlen/gocognit report-only while #410 burns down the
# structural complexity baseline.
run:
  timeout: 5m

linters:
  default: none
  enable:
    - contextcheck
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    funlen:
      lines: 80
      statements: 50
      ignore-comments: true
    gocognit:
      min-complexity: 10
    revive:
      rules:
        - name: var-naming
          arguments:
            - ["ID", "API", "HTTP", "HTTPS", "URL", "JSON", "SQL", "UUID"]
            - []

formatters:
  enable:
    - gofmt
